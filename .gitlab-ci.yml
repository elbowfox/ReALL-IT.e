# ============================================================
# ElbowFox — Pipeline Alpha
# Personal CI/CD pipeline for autonomous revenue projects
# ============================================================

stages:
  - validate
  - test
  - deploy
  - notify

variables:
  VERCEL_ORG_ID: $VERCEL_ORG_ID
  VERCEL_TOKEN: $VERCEL_TOKEN
  NODE_VERSION: "20"

# ── TEMPLATES ───────────────────────────────────────────────

.node_base:
  image: node:20-alpine
  before_script:
    - npm install -g vercel@latest
    - node --version
    - npm --version

.python_base:
  image: python:3.11-slim
  before_script:
    - pip install --quiet -r requirements.txt 2>/dev/null || true

.notify_fox:
  after_script:
    - |
      curl -s -X POST "$N8N_WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -d "{
          \"pipeline\": \"$CI_PIPELINE_ID\",
          \"project\": \"$CI_PROJECT_NAME\",
          \"status\": \"$CI_JOB_STATUS\",
          \"branch\": \"$CI_COMMIT_BRANCH\",
          \"commit\": \"$CI_COMMIT_SHORT_SHA\",
          \"message\": \"$CI_COMMIT_MESSAGE\",
          \"url\": \"$CI_PIPELINE_URL\"
        }" || true

# ── VALIDATE ────────────────────────────────────────────────

validate:syntax:
  stage: validate
  image: node:20-alpine
  script:
    - echo "Validating project structure..."
    - |
      if [ -f "package.json" ]; then
        node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))" && echo "package.json valid"
      fi
    - |
      if [ -f "requirements.txt" ]; then
        echo "Python project detected"
        python3 -m py_compile $(find . -name "*.py" -not -path "*/node_modules/*" | head -20) 2>/dev/null && echo "Python syntax OK" || echo "Python syntax warnings"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

validate:secrets:
  stage: validate
  image: alpine:latest
  script:
    - echo "Checking for accidentally committed secrets..."
    - |
      if grep -r "sk-[a-zA-Z0-9]" . --include="*.py" --include="*.js" --include="*.ts" --exclude-dir=node_modules 2>/dev/null | grep -v ".example" | grep -v "test"; then
        echo "WARNING: Possible API key in source code"
        exit 1
      fi
    - echo "No obvious secrets found"
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ── TEST ────────────────────────────────────────────────────

test:python:
  stage: test
  extends: .python_base
  script:
    - |
      if [ -f "requirements.txt" ]; then
        echo "Running Python checks..."
        pip install --quiet pytest 2>/dev/null || true
        if [ -d "tests" ]; then
          python -m pytest tests/ -v --tb=short || true
        else
          echo "No tests directory — skipping pytest"
          python -c "import bot.main" 2>/dev/null && echo "Import check passed" || echo "Import check skipped"
        fi
      else
        echo "No requirements.txt — skipping Python test"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH == "main"'

test:node:
  stage: test
  extends: .node_base
  script:
    - |
      if [ -f "package.json" ]; then
        npm ci --silent 2>/dev/null || npm install --silent
        npm test 2>/dev/null || echo "No tests configured — skipping"
        npm run build 2>/dev/null || echo "No build script — skipping"
      else
        echo "No package.json — skipping Node test"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── DEPLOY ──────────────────────────────────────────────────

deploy:vercel:preview:
  stage: deploy
  extends: .node_base
  script:
    - echo "Deploying preview to Vercel..."
    - vercel --token=$VERCEL_TOKEN --yes 2>/dev/null | tail -5
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
  rules:
    - if: '$CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master"'
    - if: '$VERCEL_TOKEN == null'
      when: never
  allow_failure: true

deploy:vercel:production:
  stage: deploy
  extends: .node_base
  script:
    - echo "Deploying to Vercel PRODUCTION..."
    - vercel --token=$VERCEL_TOKEN --prod --yes 2>/dev/null | tail -5
    - echo "Production deploy complete"
  environment:
    name: production
    url: https://$CI_PROJECT_NAME.vercel.app
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    - if: '$VERCEL_TOKEN == null'
      when: never
  when: manual

deploy:railway:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl bash
  script:
    - echo "Triggering Railway deploy..."
    - |
      if [ -n "$RAILWAY_TOKEN" ] && [ -n "$RAILWAY_SERVICE_ID" ]; then
        curl -s -X POST "https://backboard.railway.app/graphql/v2" \
          -H "Authorization: Bearer $RAILWAY_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"query\": \"mutation { deploymentCreate(input: { serviceId: \\\"$RAILWAY_SERVICE_ID\\\" }) { id } }\"}"
        echo "Railway deploy triggered"
      else
        echo "RAILWAY_TOKEN or RAILWAY_SERVICE_ID not set — skipping Railway deploy"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - exists:
        - Dockerfile
  allow_failure: true

# ── NOTIFY ──────────────────────────────────────────────────

notify:fox:success:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Notifying Fox via n8n..."
    - |
      if [ -n "$N8N_WEBHOOK_URL" ]; then
        curl -s -X POST "$N8N_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{
            \"event\": \"pipeline_success\",
            \"project\": \"$CI_PROJECT_NAME\",
            \"branch\": \"$CI_COMMIT_BRANCH\",
            \"commit\": \"$CI_COMMIT_SHORT_SHA\",
            \"message\": \"$(echo $CI_COMMIT_MESSAGE | head -c 100)\",
            \"pipeline_url\": \"$CI_PIPELINE_URL\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }"
        echo "Fox notified"
      else
        echo "N8N_WEBHOOK_URL not set — Fox not notified"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  allow_failure: true

notify:fox:failure:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if [ -n "$N8N_WEBHOOK_URL" ]; then
        curl -s -X POST "$N8N_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{
            \"event\": \"pipeline_failure\",
            \"project\": \"$CI_PROJECT_NAME\",
            \"branch\": \"$CI_COMMIT_BRANCH\",
            \"commit\": \"$CI_COMMIT_SHORT_SHA\",
            \"failed_job\": \"$CI_JOB_NAME\",
            \"pipeline_url\": \"$CI_PIPELINE_URL\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_failure
  allow_failure: true
